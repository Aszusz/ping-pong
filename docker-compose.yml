services:
  db-dev:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api-dev:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-dev:5432/${POSTGRES_DB}
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/db/src:/app/packages/db/src
    depends_on:
      - db-dev

  db-test:
    image: postgres:16-alpine
    profiles: ["test"]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}_test
    volumes:
      - pgdata-test:/var/lib/postgresql/data

  api-test:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    profiles: ["test"]
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-test:5432/${POSTGRES_DB}_test
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/db/src:/app/packages/db/src
    depends_on:
      - db-test

volumes:
  pgdata:
  pgdata-test:
